<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Image Studio - Custom Ratio</title>
    <link href='./static/img/sksinha4.ico' rel='icon' type='image/x-icon'/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .main-container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 30px rgba(0,0,0,0.6); }
        .img-wrapper { width: 100%; max-height: 500px; background: #000; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        img { max-width: 100%; display: block; }
        
        .toolbar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #2d2d2d; padding: 20px; border-radius: 8px; }
        .control-item { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; color: #27ae60; font-weight: bold; text-transform: uppercase; }
        
        input, select { background: #3d3d3d; border: 1px solid #555; color: white; padding: 10px; border-radius: 5px; outline: none; }
        input:focus { border-color: #27ae60; }
        
        .btn-group { display: flex; gap: 5px; }
        button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; background: #444; color: white; }
        .btn-primary { background: #3498db; }
        .btn-download { background: #27ae60; width: 100%; font-size: 18px; margin-top: 20px; height: 50px; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #customRatioInputs { display: none; margin-top: 10px; background: #3d3d3d; padding: 10px; border-radius: 5px; border-left: 4px solid #27ae60; }
        
        .status-bar {
            margin-top: 15px;
            padding: 10px;
            background: #2d2d2d;
            border-radius: 5px;
            font-size: 12px;
            display: none;
        }
        
        .status-bar.show {
            display: block;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .success { color: #27ae60; }
        .info { color: #3498db; }

        /* Custom Confirmation Dialog */
        .confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.2s ease;
        }

        .confirm-dialog {
            background: #1e1e1e;
            border-radius: 20px;
            padding: 24px;
            max-width: 350px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.2s ease;
            border: 1px solid #333;
        }

        .confirm-dialog h3 {
            color: #27ae60;
            margin-bottom: 16px;
        }

        .confirm-dialog .size-info {
            background: #2d2d2d;
            padding: 15px;
            border-radius: 12px;
            margin: 16px 0;
        }

        .confirm-dialog .original-size {
            color: #ffa502;
            font-size: 18px;
            font-weight: bold;
        }

        .confirm-dialog .new-size {
            color: #27ae60;
            font-size: 24px;
            font-weight: bold;
        }

        .confirm-dialog .saved {
            color: #27ae60;
            font-size: 14px;
            margin-top: 8px;
        }

        .confirm-dialog .increased {
            color: #ff4757;
            font-size: 14px;
            margin-top: 8px;
        }

        .confirm-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .confirm-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-confirm {
            background: #27ae60;
            color: white;
        }

        .btn-cancel {
            background: #ff4757;
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <h2 style="text-align: center; color: #27ae60; margin-top: 0;">⚡ Advanced Image Toolkit</h2>
    
    <input type="file" id="upload" accept="image/*" style="margin-bottom: 20px; width: 100%;">

    <div class="img-wrapper">
        <img id="image">
    </div>

    <div class="toolbar">
        <div class="control-item">
            <label>Ratio Lock</label>
            <select id="ratioSelect">
                <option value="NaN">Free (No Lock)</option>
                <option value="1">1:1 (Square)</option>
                <option value="1.333">4:3 (Classic)</option>
                <option value="1.777">16:9 (HD)</option>
                <option value="custom">-- Custom Ratio --</option>
            </select>
            
            <div id="customRatioInputs">
                <div style="display: flex; gap: 5px; align-items: center;">
                    <input type="number" id="ratioW" placeholder="W" style="width: 50px;">
                    <span>:</span>
                    <input type="number" id="ratioH" placeholder="H" style="width: 50px;">
                    <button class="btn-primary" onclick="setCustomRatio()" style="font-size: 12px; padding: 5px;">Apply</button>
                </div>
            </div>
        </div>

        <div class="control-item">
            <label>Zoom & Rotation</label>
            <div class="btn-group">
                <button onclick="cropper.zoom(0.1)">+</button>
                <button onclick="cropper.zoom(-0.1)">-</button>
                <button onclick="adjRotate(-1)">↺</button>
                <input type="number" id="rotateDeg" value="0" style="width: 60px; text-align: center;">
                <button onclick="adjRotate(1)">↻</button>
            </div>
        </div>

        <div class="control-item">
            <label>Target Size (KB)</label>
            <input type="number" id="targetKb" placeholder="e.g. 50 or 500">
            <small style="color: #888;">Leave empty for default quality</small>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <label>Filename (Edit before download):</label>
        <input type="text" id="filename" style="width: 100%; margin-top: 8px;">
        <button class="btn-download" id="downloadBtn">💾 Download Edited Image</button>
    </div>
    
    <div class="status-bar" id="statusBar">
        <div id="statusMessage"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    let cropper;
    const image = document.getElementById('image');
    const rotateInput = document.getElementById('rotateDeg');
    const customUI = document.getElementById('customRatioInputs');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusBar = document.getElementById('statusBar');
    const statusMessage = document.getElementById('statusMessage');
    const targetKbInput = document.getElementById('targetKb');
    
    let currentFile = null;
    let originalFileSizeKB = 0;
    
    function showStatus(message, type = 'info') {
        statusMessage.innerHTML = message;
        statusBar.classList.add('show');
        setTimeout(() => {
            statusBar.classList.remove('show');
        }, 3000);
    }
    
    // Custom Confirmation Dialog
    function showConfirmDialog(originalSize, newSize, downloadCallback) {
        // Remove any existing overlay
        const existingOverlay = document.querySelector('.confirm-overlay');
        if (existingOverlay) existingOverlay.remove();
        
        const overlay = document.createElement('div');
        overlay.className = 'confirm-overlay';
        
        const saved = originalSize - newSize;
        const isCompressed = saved > 0;
        const savedPercent = ((Math.abs(saved) / originalSize) * 100).toFixed(1);
        
        overlay.innerHTML = `
            <div class="confirm-dialog">
                <h3>📊 Download Confirmation</h3>
                <div class="size-info">
                    <div style="margin-bottom: 8px;">📁 Original Size:</div>
                    <div class="original-size">${originalSize.toFixed(1)} KB</div>
                    <div style="margin: 12px 0 8px 0;">✨ New Size:</div>
                    <div class="new-size">${newSize.toFixed(1)} KB</div>
                    ${isCompressed ? 
                        `<div class="saved">✅ Saved: ${saved.toFixed(1)} KB (${savedPercent}% smaller)</div>` : 
                        `<div class="increased">⚠️ Increased: ${Math.abs(saved).toFixed(1)} KB (${savedPercent}% larger)</div>`
                    }
                </div>
                <div class="confirm-buttons">
                    <button class="btn-confirm" id="confirmDownload">✓ Download</button>
                    <button class="btn-cancel" id="cancelDownload">✗ Cancel</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(overlay);
        
        document.getElementById('confirmDownload').onclick = () => {
            overlay.remove();
            downloadCallback();
        };
        
        document.getElementById('cancelDownload').onclick = () => {
            overlay.remove();
        };
        
        // Close on overlay click
        overlay.onclick = (e) => {
            if (e.target === overlay) {
                overlay.remove();
            }
        };
    }
    
    document.getElementById('upload').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            currentFile = file;
            originalFileSizeKB = file.size / 1024;
            document.getElementById('filename').value = file.name.replace(/\.[^/.]+$/, '');
            
            // Show original size
            const sizeKB = (file.size / 1024).toFixed(1);
            showStatus(`📸 Image loaded: ${sizeKB} KB | Format: ${file.type.split('/')[1].toUpperCase()}`, 'info');
            
            const reader = new FileReader();
            reader.onload = (event) => {
                image.src = event.target.result;
                if (cropper) cropper.destroy();
                initCropper(NaN);
            };
            reader.readAsDataURL(file);
        }
    };
    
    function initCropper(ratio) {
        cropper = new Cropper(image, {
            aspectRatio: isNaN(ratio) ? NaN : ratio,
            viewMode: 1,
            autoCropArea: 0.8,
            checkOrientation: false
        });
    }
    
    // Ratio Switch Logic
    document.getElementById('ratioSelect').onchange = function() {
        if (this.value === 'custom') {
            customUI.style.display = 'block';
        } else {
            customUI.style.display = 'none';
            const ratio = parseFloat(this.value);
            if (!isNaN(ratio)) {
                cropper.setAspectRatio(ratio);
            } else {
                cropper.setAspectRatio(NaN);
            }
        }
    };
    
    // User Custom Ratio Apply
    function setCustomRatio() {
        const w = parseFloat(document.getElementById('ratioW').value);
        const h = parseFloat(document.getElementById('ratioH').value);
        if (w > 0 && h > 0) {
            cropper.setAspectRatio(w / h);
            showStatus(`✅ Aspect ratio set to ${w}:${h}`, 'success');
        } else {
            alert("Please enter valid Width and Height");
        }
    }
    
    function adjRotate(val) {
        rotateInput.value = (parseInt(rotateInput.value) + val + 360) % 360;
        cropper.rotateTo(rotateInput.value);
    }
    
    document.getElementById('rotateDeg').onchange = function() {
        cropper.rotateTo(this.value);
    };
    
    downloadBtn.onclick = async () => {
        if (!cropper) {
            alert("Upload an image first!");
            return;
        }
        
        const targetKb = targetKbInput.value;
        const filename = document.getElementById('filename').value || "edited_image";
        
        // Show loading state
        const originalText = downloadBtn.innerHTML;
        downloadBtn.innerHTML = '<span class="spinner"></span> Processing...';
        downloadBtn.disabled = true;
        
        try {
            // Get cropped canvas
            const canvas = cropper.getCroppedCanvas({ imageSmoothingQuality: 'high' });
            
            // Convert canvas to blob
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.95));
            
            // Show compression info
            const croppedSizeKB = (blob.size / 1024).toFixed(1);
            showStatus(`🔄 Processing: Cropped ${croppedSizeKB} KB → Target ${targetKb || 'Auto'} KB`, 'info');
            
            // Send to server for smart compression
            const formData = new FormData();
            formData.append('image', blob, "image.jpg");
            formData.append('target_kb', targetKb);
            
            const response = await fetch('/resize', { method: 'POST', body: formData });
            
            if (!response.ok) {
                throw new Error('Server error');
            }
            
            const downloadBlob = await response.blob();
            const finalSizeKB = downloadBlob.size / 1024;
            
            // Show confirmation dialog before download
            showConfirmDialog(originalFileSizeKB, finalSizeKB, () => {
                const url = window.URL.createObjectURL(downloadBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${filename}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                
                // Show success message
                if (targetKb) {
                    const diff = Math.abs(finalSizeKB - targetKb);
                    if (diff <= targetKb * 0.1) {
                        showStatus(`✅ Success! Size: ${finalSizeKB.toFixed(1)} KB (Target: ${targetKb} KB)`, 'success');
                    } else {
                        showStatus(`⚠️ Size: ${finalSizeKB.toFixed(1)} KB (Target: ${targetKb} KB) - Close enough!`, 'info');
                    }
                } else {
                    showStatus(`✅ Downloaded! Final size: ${finalSizeKB.toFixed(1)} KB`, 'success');
                }
            });
            
        } catch (error) {
            console.error('Error:', error);
            alert('Error processing image: ' + error.message);
            showStatus('❌ Error processing image', 'error');
        } finally {
            downloadBtn.innerHTML = originalText;
            downloadBtn.disabled = false;
        }
    };
</script>
</body>
</html>
