    <script>
        // MyMemory Translation API - Free, No API Key Required
        // Works same as Google Translate, completely free and reliable
        
        async function translateToHindi(englishText) {
            if (!englishText || englishText.trim().length === 0) return '';
            
            try {
                // Clean input: remove extra spaces, trim
                let cleanText = englishText.trim().replace(/\s+/g, ' ');
                
                const response = await fetch(
                    `https://api.mymemory.translated.net/get?q=${encodeURIComponent(cleanText)}&langpair=en|hi`,
                    { timeout: 8000 }
                );
                const data = await response.json();
                
                if (data.responseStatus === 200 && data.responseData.translatedText) {
                    let result = data.responseData.translatedText;
                    // Clean output: normalize spaces and remove stray matras
                    result = result.replace(/\s+/g, ' ').trim();
                    
                    // Remove trailing matras (vowel modifiers) that shouldn't be at the end
                    const hindiMatras = ['ा', 'ि', 'ी', 'ु', 'ू', 'े', 'ै', 'ो', 'ौ', '्', 'ः', 'ं', 'ँ'];
                    while (result.length > 0 && hindiMatras.includes(result[result.length - 1])) {
                        result = result.slice(0, -1);
                    }
                    
                    return result;
                }
            } catch(err) {
                console.log('Translation API (will retry):', err.message);
            }
            return '';
        }

        // Debounce timer for smoother real-time translation
        let translationTimeout = {};

        // Sync English name fields to Hindi fields
        function setupNameFieldSync() {
            // Applicant name sync
            const appEnglishField = document.getElementById('a_n_en');
            const appHindiField = document.getElementById('a_n_hn');
            
            if (appEnglishField && appHindiField) {
                setupFieldPair(appEnglishField, appHindiField);
            }

            // Applicant father name sync
            const appFatherEnField = document.getElementById('a_f_en');
            const appFatherHnField = document.getElementById('a_f_hn');
            
            if (appFatherEnField && appFatherHnField) {
                setupFieldPair(appFatherEnField, appFatherHnField);
            }
        }

        function setupFieldPair(englishField, hindiField) {
            englishField.addEventListener('input', async function(e) {
                let englishText = this.value;
                
                // Don't translate if empty
                if (!englishText || englishText.trim().length === 0) {
                    hindiField.value = '';
                    return;
                }

                // Real-time translation as user types
                const cursorPos = this.selectionStart;
                const fieldKey = `${englishField.id}_${hindiField.id}`;
                
                // Show translating indicator
                hindiField.style.borderColor = '#ffc107';
                hindiField.style.boxShadow = '0 0 0 2px #fff8e1';
                
                // Clear previous timeout
                if (translationTimeout[fieldKey]) {
                    clearTimeout(translationTimeout[fieldKey]);
                }
                
                // Debounce translation
                translationTimeout[fieldKey] = setTimeout(async () => {
                    try {
                        const translated = await translateToHindi(englishText);
                        if (translated) {
                            hindiField.value = translated;
                            // Success - green border
                            hindiField.style.borderColor = '#28a745';
                            hindiField.style.boxShadow = '0 0 0 2px #d4edda';
                            setTimeout(() => {
                                hindiField.style.borderColor = '#ccc';
                                hindiField.style.boxShadow = 'none';
                            }, 1000);
                        }
                    } catch(err) {
                        console.log('Translation error:', err);
                        hindiField.style.borderColor = '#dc3545';
                        hindiField.style.boxShadow = '0 0 0 2px #f8d7da';
                        setTimeout(() => {
                            hindiField.style.borderColor = '#ccc';
                            hindiField.style.boxShadow = 'none';
                        }, 1500);
                    }
                }, 800);
            });

            // Handle backspace and deletion sync
            hindiField.addEventListener('input', function(e) {
                let hindiText = this.value;
                
                // Normalize spaces
                hindiText = hindiText.replace(/\s+/g, ' ');
                
                // Remove trailing matras
                const hindiMatras = ['ा', 'ि', 'ी', 'ु', 'ू', 'े', 'ै', 'ो', 'ौ', '्', 'ः', 'ं', 'ँ'];
                while (hindiText.length > 0 && hindiMatras.includes(hindiText[hindiText.length - 1])) {
                    hindiText = hindiText.slice(0, -1);
                }
                
                this.value = hindiText.trim();
            });

            // Add focus styles
            hindiField.addEventListener('focus', function() {
                this.style.borderColor = '#2e86c1';
                this.style.boxShadow = '0 0 0 2px #d6eaf8';
            });

            hindiField.addEventListener('blur', function() {
                this.style.borderColor = '#ccc';
                this.style.boxShadow = 'none';
            });
        }

        // Initialize member name sync when new member is added
        function initializeHindiInputs() {
            const memberRows = document.querySelectorAll('[data-member-id]');
            memberRows.forEach((row) => {
                const memberEnglishName = row.querySelector('.m_n_en');
                const memberHindiName = row.querySelector('.m_n_hn');
                const memberEnglishFather = row.querySelector('.m_f_en');
                const memberHindiFather = row.querySelector('.m_f_hn');

                if (memberEnglishName && memberHindiName) {
                    // Remove old listeners by cloning
                    const newEnglishName = memberEnglishName.cloneNode(true);
                    memberEnglishName.parentNode.replaceChild(newEnglishName, memberEnglishName);
                    const newHindiName = memberHindiName.cloneNode(true);
                    memberHindiName.parentNode.replaceChild(newHindiName, memberHindiName);
                    setupFieldPair(newEnglishName, newHindiName);
                }

                if (memberEnglishFather && memberHindiFather) {
                    const newEnglishFather = memberEnglishFather.cloneNode(true);
                    memberEnglishFather.parentNode.replaceChild(newEnglishFather, memberEnglishFather);
                    const newHindiFather = memberHindiFather.cloneNode(true);
                    memberHindiFather.parentNode.replaceChild(newHindiFather, memberHindiFather);
                    setupFieldPair(newEnglishFather, newHindiFather);
                }
            });
        }
        }

        window.addEventListener('load', function() {
            setTimeout(initializeHindiInputs, 500);
        });
    </script>

    function removeMember(memberId) {
        const memberElement = document.querySelector(`.row[data-member-id="${memberId}"]`);

            memberElement.remove();
            membersList = membersList.filter(id => id !== memberId);
            reindexMembers();

    function removeAllMembers() {
        document.getElementById('m-container').innerHTML = '';
        membersList = [];
        memberCounter = 0;
        addNewMember();
    }
    
    function reindexMembers() {
        const containers = document.querySelectorAll('#m-container .row');
        let newIndex = 1;
        containers.forEach((container) => {
            const header = container.querySelector('.member-header strong');
            const removeBtn = container.querySelector('.remove-btn');
            const newId = Date.now() + newIndex;
            container.setAttribute('data-member-id', newId);
            container.setAttribute('data-member-index', newIndex);
            if(header) header.innerHTML = `👤 सदस्य #${newIndex}`;
            if(removeBtn) removeBtn.setAttribute('onclick', `removeMember(${newId})`);
            newIndex++;
        });
        memberCounter = newIndex - 1;
    }

    function generateMemberJS(member, mobile, index) {
        let age = "20";
        if(member.dob && member.dob.split("-").length === 3) {

            if(!isNaN(birthYear)) age = (new Date().getFullYear() - birthYear).toString();

        const m_data = {
            "ContentPlaceHolder1_txtMemberNameEn": member.name_en,
            "ContentPlaceHolder1_txtMemberNameHn": member.name_hn,
            "ContentPlaceHolder1_txtMemberFatherNameEn": member.father_en,
            "ContentPlaceHolder1_txtMemberFatherNameHn": member.father_hn,
            "ContentPlaceHolder1_ddlMemberGender": member.gender,
            "ContentPlaceHolder1_txtMemberDOB": member.dob,
            "ContentPlaceHolder1_ddlMemberMaritalStatus": member.marital_status,
            "ContentPlaceHolder1_ddlMemberRelationShip": member.relation,
            "ContentPlaceHolder1_txtMemberAadhaarNo": member.aadhaar,
            "ContentPlaceHolder1_txtMemberMobileNo": mobile,
            "ContentPlaceHolder1_ddlMemberOccupation": "13",
            "ContentPlaceHolder1_txtMemberSourceOfIncome": "NA",
            "ContentPlaceHolder1_txtMemberMonthlyIncome": "0",
            "ContentPlaceHolder1_txtMemberAge": age
        };

        return `javascript:(function(){const d=${JSON.stringify(m_data)};for(let id in d){let el=document.getElementById(id);if(el){el.value=d[id];el.dispatchEvent(new Event('input',{bubbles:true}));el.dispatchEvent(new Event('change',{bubbles:true}));el.dispatchEvent(new Event('blur',{bubbles:true}));}}})();`;
    }

    function generateApplicantJS(applicant, rc_no) {
        const a_data = {
            "ContentPlaceHolder1_txtRationCardNo": rc_no,
            "ContentPlaceHolder1_txtApplicantNameEn": applicant.name_en,
            "ContentPlaceHolder1_txtApplicantNameHn": applicant.name_hn,
            "ContentPlaceHolder1_txtApplicantFatherNameEn": applicant.father_en,
            "ContentPlaceHolder1_txtApplicantFatherNameHn": applicant.father_hn,
            "ContentPlaceHolder1_ddlApplicantGender": applicant.gender,
            "ContentPlaceHolder1_ddlApplicantRelationShip": "01",
            "ContentPlaceHolder1_ddlApplicantCasteCategory": "02",
            "ContentPlaceHolder1_txtCasteCertificateNo": applicant.cas_cert_no,
            "ContentPlaceHolder1_txtApplicantSourceOfIncome": applicant.occupation,
            "ContentPlaceHolder1_txtApplicantMonthlyIncome": applicant.income,
            "ContentPlaceHolder1_txtIncomeCertificateNo": applicant.income_cert_no,
            "ContentPlaceHolder1_ddlRectification": "I",
            "ContentPlaceHolder1_ddlBankName": "00268",
            "ContentPlaceHolder1_ddlBankBranch": "7434",
            "ContentPlaceHolder1_ddlBankIFSC": "PUNB0MBGB06",
            "ContentPlaceHolder1_txtApplicantBankAccountNo": applicant.bank_acc,
            "ContentPlaceHolder1_txtApplicantAddress": applicant.address
        };

        return `javascript:(function(){const d=${JSON.stringify(a_data)};function fill(){let changed=false;for(let id in d){let el=document.getElementById(id);if(el && el.value!==d[id]){el.value=d[id];el.dispatchEvent(new Event('change',{bubbles:true}));el.dispatchEvent(new Event('input',{bubbles:true}));changed=true;}}if(changed){console.log('Fields updated...');}}fill();setTimeout(fill, 2000);setTimeout(fill, 4000);})();`;

    // Collect form data
    function collectFormData() {
        const applicant = {
            name_en: document.getElementById('a_n_en').value,
            name_hn: document.getElementById('a_n_hn').value,
            father_en: document.getElementById('a_f_en').value,
            father_hn: document.getElementById('a_f_hn').value,
            gender: document.getElementById('a_gen').value,
            occupation: document.getElementById('a_occ').value,
            income: document.getElementById('a_inc').value,
            income_cert_no: document.getElementById('a_inc_no').value,
            
            cas_cert_no: document.getElementById('a_cas_no').value,
            bank_acc: document.getElementById('a_bank').value,
            address: document.getElementById('a_addr').value
        };

        const members = [];
        document.querySelectorAll('#m-container .row').forEach(block => {
            members.push({
                name_en: block.querySelector('.m_n_en').value,
                name_hn: block.querySelector('.m_n_hn').value,
                father_en: block.querySelector('.m_f_en').value,
                father_hn: block.querySelector('.m_f_hn').value,
                gender: block.querySelector('.m_gen').value,
                relation: block.querySelector('.m_rel').value,
                marital_status: block.querySelector('.m_sta').value,
                dob: block.querySelector('.m_dob').value,
                aadhaar: block.querySelector('.m_aadhaar').value
            });
        });

        return {
            user_id: document.getElementById('user_id').value,
            rc_no: document.getElementById('rc_no').value,
            mobile: document.getElementById('m_mobile').value,
            applicant,
            members
        };
    }

    // Generate and Save together
    async function generateAndSave() {
        const formData = collectFormData();
        const { applicant, members, user_id, rc_no, mobile } = formData;
        
        if (!user_id) {
            showStatus('save-status', '❌ Please enter User ID', 'error');
            return;
        }
        
        // Generate JS codes exactly as shown on page
        const applicantJS = generateApplicantJS(applicant, rc_no);
        
        const memberJSList = [];
        members.forEach((member, idx) => {
            const memberJS = generateMemberJS(member, mobile, idx);
            memberJSList.push({
                js_code: memberJS,
                name_en: member.name_en,
                index: idx + 1,
                data: member
            });
        });
        
        // Display in output
        document.getElementById('final-output').style.display = 'block';
        document.getElementById('app-res').value = applicantJS;
        
        const mList = document.getElementById('m-res-list');
        mList.innerHTML = '';
        memberJSList.forEach((m, idx) => {
            mList.innerHTML += `
                <div style="margin-top:15px;">
                    <strong style="color:#a9dc76;">सदस्य #${m.index} (${m.name_en}) का कोड:</strong>
                    <textarea id="m-res-${idx}" readonly>${escapeHtml(m.js_code)}</textarea>
                    <button class="copy-btn" onclick="copyCode('m-res-${idx}')">Copy Member #${m.index} Code</button>
                </div>`;
        });
        
        // Save to database
        showStatus('save-status', '⏳ Database में save हो रहा है...', 'info');
        
        try {
            const response = await fetch('/rconline/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: user_id,
                    rc_no: rc_no,
                    mobile: mobile,
                    applicant: applicant,
                    members: members,
                    applicant_js: applicantJS,
                    members_js: memberJSList
                })
            });
            const result = await response.json();
            
            if(result.success) {
                showStatus('save-status', result.message, 'success');
            } else {
                showStatus('save-status', result.message, 'error');
            }
        } catch(err) {
            showStatus('save-status', '❌ Network error: ' + err.message, 'error');
        }
    }
    
    // Search Function
    async function searchData() {
        const searchUserId = document.getElementById('search_user_id').value.trim();
        const searchRcNo = document.getElementById('search_rc_no').value.trim();
        
        if(!searchUserId && !searchRcNo) {
            showStatus('search-status', '❌ user_id या RC No में से कोई एक जरूर डालें', 'error');
            return;
        }
        
        showStatus('search-status', '⏳ खोज रहे हैं...', 'info');
        document.getElementById('search-result-output').style.display = 'none';
        
        const params = new URLSearchParams();
        if(searchUserId) params.append('user_id', searchUserId);
        if(searchRcNo) params.append('rc_no', searchRcNo);
        
        try {
            const response = await fetch('/rconline/search?' + params.toString());
            const result = await response.json();
            
            if(result.success) {
                lastSearchResult = result;
                showStatus('search-status', `✅ मिला! Total ${result.total_members} सदस्य`, 'success');
                
                const codesDiv = document.getElementById('search-codes');
                codesDiv.innerHTML = `
                    <div style="background:#e9ecef; padding:12px; border-radius:8px; margin-bottom:10px;">
                        <strong>User ID:</strong> ${escapeHtml(result.applicant_name)}<br>
                        <strong>Total Members:</strong> ${result.total_members}
                    </div>
                `;
                
                // Applicant JS Code
                codesDiv.innerHTML += `
                    <div style="margin-bottom:14px;">
                        <strong>📋 आवेदिका का JS Code:</strong>
                        <textarea id="s-app-res" readonly style="height:70px;">${escapeHtml(result.applicant_js)}</textarea>
                        <button class="copy-btn" onclick="copyCode('s-app-res')">Copy Applicant Code</button>
                    </div>
                `;
                
                // Members JS Codes
                if(result.members && result.members.length > 0) {
                    result.members.forEach((m, idx) => {
                        codesDiv.innerHTML += `
                            <div style="margin-bottom:14px;">
                                <strong>👤 सदस्य #${m.index} (${escapeHtml(m.name_en)}) का JS Code:</strong>
                                <textarea id="s-m-res-${idx}" readonly style="height:70px;">${escapeHtml(m.js_code)}</textarea>
                                <button class="copy-btn" onclick="copyCode('s-m-res-${idx}')">Copy Member #${m.index} Code</button>
                            </div>
                        `;
                    });
                }
                
                document.getElementById('search-result-output').style.display = 'block';
            } else {
                showStatus('search-status', result.message, 'error');
                document.getElementById('search-result-output').style.display = 'none';
            }
        } catch(err) {
            showStatus('search-status', '❌ Network error: ' + err.message, 'error');
        }
    }
    
    // Load search result to form
    async function loadSearchToForm() {
        if (!lastSearchResult) {
            showStatus('search-status', '❌ पहले खोज करें', 'error');
            return;
        }
        
        showStatus('search-status', '⏳ फॉर्म में लोड हो रहा है...', 'info');
        
        try {
            const params = new URLSearchParams();
            params.append('user_id', lastSearchResult.applicant_name);
            const response = await fetch('/rconline/load?' + params.toString());
            const result = await response.json();
            
            if(result.success) {
                // Load applicant data
                document.getElementById('user_id').value = result.user_id;
                document.getElementById('rc_no').value = result.rc_no;
                document.getElementById('m_mobile').value = result.mobile;
                
                if(result.applicant_data) {
                    document.getElementById('a_n_en').value = result.applicant_data.name_en || '';
                    document.getElementById('a_n_hn').value = result.applicant_data.name_hn || '';
                    document.getElementById('a_f_en').value = result.applicant_data.father_en || '';
                    document.getElementById('a_f_hn').value = result.applicant_data.father_hn || '';
                    document.getElementById('a_gen').value = result.applicant_data.gender || 'F';
                    document.getElementById('a_occ').value = result.applicant_data.occupation || '';
                    document.getElementById('a_inc').value = result.applicant_data.income || '';
                    document.getElementById('a_inc_no').value = result.applicant_data.income_cert_no || '';
                    document.getElementById('a_cas_no').value = result.applicant_data.cas_cert_no || '';
                    document.getElementById('a_bank').value = result.applicant_data.bank_acc || '';
                    document.getElementById('a_addr').value = result.applicant_data.address || '';
                }
                
                // Load members
                removeAllMembers();
                if(result.members && result.members.length > 0) {
                    result.members.forEach((member, idx) => {
                        if (idx > 0) addNewMember();
                        const memberBlock = document.querySelectorAll('#m-container .row')[idx];
                        if (memberBlock) {
                            memberBlock.querySelector('.m_n_en').value = member.name_en || '';
                            memberBlock.querySelector('.m_n_hn').value = member.name_hn || '';
                            memberBlock.querySelector('.m_f_en').value = member.father_en || '';
                            memberBlock.querySelector('.m_f_hn').value = member.father_hn || '';
                            memberBlock.querySelector('.m_gen').value = member.gender || 'M';
                            memberBlock.querySelector('.m_rel').value = member.relation || '02';
                            memberBlock.querySelector('.m_sta').value = member.marital_status || '1';
                            memberBlock.querySelector('.m_dob').value = member.dob || '';
                            memberBlock.querySelector('.m_aadhaar').value = member.aadhaar || '';
                        }
                    });
                }
                
                showStatus('search-status', '✅ डेटा फॉर्म में लोड हो गया!', 'success');
                setTimeout(() => {
                    document.getElementById('search-status').style.display = 'none';
                }, 2000);
            } else {
                showStatus('search-status', result.message, 'error');
            }
        } catch(err) {
            showStatus('search-status', '❌ Load error: ' + err.message, 'error');
        }
    }
    
    function clearSearch() {
        document.getElementById('search_user_id').value = '';
        document.getElementById('search_rc_no').value = '';
        document.getElementById('search-status').style.display = 'none';
        document.getElementById('search-result-output').style.display = 'none';
        lastSearchResult = null;
    }
    
    function showStatus(elementId, message, type) {
        const el = document.getElementById(elementId);
        el.style.display = 'block';
        el.className = `status-msg status-${type}`;
        el.textContent = message;
        setTimeout(() => { el.style.display = 'none'; }, 5000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    
    function copyCode(id) {
        const text = document.getElementById(id);
        text.select();
        navigator.clipboard.writeText(text.value);
        alert("✅ कोड कॉपी हो गया!");
    }
</script>
