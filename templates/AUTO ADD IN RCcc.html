    // Consonant mapping (बिना मात्रा के)
    const CONS = {
        'KSH':'क्ष','GY':'ज्ञ','SH':'श','SHH':'श','CH':'च','CHH':'छ','TH':'थ','PH':'फ','KH':'ख',
        'GH':'घ','JH':'झ','DH':'ध','BH':'भ','NG':'ंग','NK':'ंक','NT':'ंत','ND':'ंद','NC':'ंच',
        'TR':'त्र','PR':'प्र','BR':'ब्र','GR':'ग्र','DR':'द्र','KR':'क्र',
        'ST':'स्त','SK':'स्क','SP':'स्प','SN':'स्न','SM':'स्म','SV':'स्व','SW':'स्व',
        'T':'त','D':'द','N':'न','P':'प','B':'ब','M':'म','Y':'य','R':'र','L':'ल',
        'V':'व','W':'व','S':'स','H':'ह','Z':'ज़','J':'ज','K':'क','G':'ग','C':'च','CHH':'छ'
    };

    // स्वर (पूर्ण रूप - जब व्यंजन पहले न हो)
    const VOW_FULL = {
        'AA':'आ','A':'अ','EE':'ई','II':'ई','OO':'ऊ','UU':'ऊ','E':'ए','AI':'ऐ',
        'AU':'औ','O':'ओ','I':'इ','U':'उ','AY':'ए'
    };

    // मात्राएँ (जब व्यंजन के बाद आएँ)
    const VOW_MATRA = {
        'AA':'ा','A':'','EE':'ी','II':'ी','OO':'ू','UU':'ू','E':'े','AI':'ै',
        'AU':'ौ','O':'ो','I':'ि','U':'ु','AY':'े'
    };

    function transliterateWord(word) {
        if (!word) return '';
        const up = word.toUpperCase().trim();
        if (!up) return '';
        
        // पहले डिक्शनरी में चेक करें
        if (NAME_DICT[up]) return NAME_DICT[up];

        let result = '';
        let i = 0;
        let lastWasConsonant = false;
        let currentConsonant = '';

        while (i < up.length) {
            // 1. पहले consonant cluster check करें (लंबे से छोटे की तरफ)
            let consMatch = null;
            let consLength = 0;
            for (const key of Object.keys(CONS).sort((a,b) => b.length - a.length)) {
                if (up.startsWith(key, i)) {
                    consMatch = key;
                    consLength = key.length;
                    break;
                }
            }
            
            if (consMatch) {
                // अगर पिछला consonant था और हम नया consonant जोड़ रहे हैं
                if (lastWasConsonant && result.length > 0) {
                    result += '्';  // हलंत लगाएँ
                }
                result += CONS[consMatch];
                lastWasConsonant = true;
                currentConsonant = consMatch;
                i += consLength;
                continue;
            }
            
            // 2. Vowel check करें
            let vowMatch = null;
            let vowLength = 0;
            for (const key of Object.keys(VOW_FULL).sort((a,b) => b.length - a.length)) {
                if (up.startsWith(key, i)) {
                    vowMatch = key;
                    vowLength = key.length;
                    break;
                }
            }
            
            if (vowMatch) {
                if (lastWasConsonant) {
                    // व्यंजन के बाद स्वर → मात्रा लगाएँ
                    const matra = VOW_MATRA[vowMatch];
                    if (matra) {
                        result += matra;
                    }
                    // अगर 'A' है तो कुछ न जोड़ें (व्यंजन के बाद default 'अ' नहीं)
                } else {
                    // पूर्ण स्वर लगाएँ (शब्द के शुरू में या व्यंजन के बिना)
                    result += VOW_FULL[vowMatch];
                }
                lastWasConsonant = false;
                i += vowLength;
                continue;
            }
            
            // 3. कोई अन्य character (ignoring)
            i++;
        }
        
        // शब्द के अंत में अगर last character consonant है तो कुछ न जोड़ें
        // (पहले 'अ' जुड़ता था, अब नहीं जुड़ेगा)
        
        return result;
    }

    function convertNameToHindi(englishName) {
        if (!englishName || !englishName.trim()) return '';
        // पूरे नाम को split करके हर शब्द को transliterate करें
        const words = englishName.trim().split(/\s+/);
        const hindiWords = words.map(w => transliterateWord(w));
        return hindiWords.join(' ');
    }

    // ── Setup a field pair: English → Hindi auto on SPACE / blur ─────────
    function setupFieldPair(engEl, hinEl) {
        if (!engEl || !hinEl) return;
        // Clone to remove stale listeners
        const eng = engEl.cloneNode(true);
        const hin = hinEl.cloneNode(true);
        engEl.parentNode.replaceChild(eng, engEl);
        hinEl.parentNode.replaceChild(hin, hinEl);

        eng.addEventListener('input', function() {
            const val = this.value;
            if (val.endsWith(' ')) {
                const words = val.trimEnd();
                if (words) {
                    hin.value = convertNameToHindi(words) + ' ';
                    flash(hin, '#28a745', '#d4edda');
                }
            }
        });
        eng.addEventListener('blur', function() {
            const val = this.value.trim();
            if (val) {
                hin.value = convertNameToHindi(val);
                flash(hin, '#28a745', '#d4edda');
            }
        });
        hin.addEventListener('focus', function() {
            this.style.borderColor = '#2e86c1';
            this.style.boxShadow = '0 0 0 2px #d6eaf8';
        });
        hin.addEventListener('blur', function() {
            this.style.borderColor = '';
            this.style.boxShadow = '';
        });
    }

    function flash(el, color, bg) {
        el.style.borderColor = color;
        el.style.boxShadow = '0 0 0 2px ' + bg;
        setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; }, 900);
    }

    function setupNameFieldSync() {
        setupFieldPair(document.getElementById('a_n_en'), document.getElementById('a_n_hn'));
        setupFieldPair(document.getElementById('a_f_en'), document.getElementById('a_f_hn'));
    }

    function initializeHindiInputs() {
        document.querySelectorAll('#m-container .row[data-member-id]').forEach(row => {

            setupFieldPair(row.querySelector('.m_f_en'), row.querySelector('.m_f_hn'));
        });
    }

                <input type="text" id="search_rc_no" placeholder="RC नंबर डालें">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-search" onclick="searchData()">🔍 खोजें</button>
                <button class="btn-clear" onclick="clearSearch()">🗑 Clear</button>
            </div>
        </div>
        <div id="search-status" class="status-msg"></div>
        <div id="search-result-output" style="display:none; margin-top:14px;">
            <h4 style="color:#b45309; margin-bottom:10px;">📋 मिला हुआ डेटा:</h4>
            <div id="search-codes"></div>
            <button class="btn-main" onclick="loadSearchToForm()" style="margin-top:10px; padding:8px 16px; font-size:13px;">📝 फॉर्म में लोड करें</button>
        </div>
    </div>

    <h2>1. आवेदिका का विवरण (Applicant)</h2>

    <div class="row" id="app-form">
        <div class="field">
            <label>नाम (English)</label>
            <input oninput="this.value = this.value.toUpperCase()" type="text" id="a_n_en" value="SUJIT KUMAR" placeholder="नाम — Space दबाने पर Hindi भरेगी">
        </div>
        <div class="field">
            <label>नाम (हिंदी) <span class="auto-badge">AUTO</span></label>
            <input type="text" id="a_n_hn" value="सुजीत कुमार" placeholder="स्वचालित हिंदी" class="hindi-field">
            
        </div>
        <div class="field">
            <label>पिता/पति (English)</label>
            <input type="text" id="a_f_en" oninput="this.value = this.value.toUpperCase()" value="NAND KUMAR SINGH" placeholder="पिता/पति — Space से Hindi">
        </div>
        <div class="field">
            <label>पिता/पति (हिंदी) <span class="auto-badge">AUTO</span></label>
            <input type="text" id="a_f_hn" value="नन्द कुमार सिंह" placeholder="स्वचालित हिंदी" class="hindi-field">
            
        </div>
        <div class="field">
            <label>लिंग</label>
            <select id="a_gen"><option value="F" selected>Female (महिला)</option><option value="M">Male (पुरुष)</option></select>
        </div>
        <div class="field"><label>व्यवसाय/आय का स्रोत</label><input type="text" id="a_occ" value="कृषि"></div>
        <div class="field"><label>मासिक आय</label><input type="number" id="a_inc" value="8000"></div>
        <div class="field"><label>आय प्रमाण पत्र सं.</label><input type="text" id="a_inc_no" value="BICCO/2026/2887987"></div>
        <div class="field"><label>jati प्रमाण पत्र सं.</label><input type="text" id="a_cas_no" value="BCCCO/2026/2887987"></div>
        <div class="field"><label>बैंक खाता सं.</label><input type="text" id="a_bank" value="989879709709"></div>
        <div class="field"><label>पूरा पता</label><input oninput="this.value = this.value.toUpperCase()" type="text" id="a_addr" value="VILL-KATHAR KHURD,PO-CHAUKIYA,PS-KRISHNA BRAHM"></div>
        <div class="field"><label>Mobile No.</label><input type="text" id="m_mobile" value="9341663558"></div>
        <div class="field"><label>RC No</label><input type="text" id="rc_no" value="10300010098032520147"></div>
        <div class="field"><label>Jan Prichay ID</label><input type="text" id="user_id" value="rinki342"></div>
    </div>

    <h2>2. परिवार के सदस्य (Members)</h2>
    <div style="margin-bottom: 20px;">
        <button onclick="addNewMember()" class="btn-add" style="margin-right: 10px;">+ नया सदस्य जोड़ें</button>
        <button onclick="removeAllMembers()" class="btn-remove" style="background:#dc3545;">सभी सदस्य हटाएँ</button>
    </div>
    
    <div id="m-container"></div>

    <div class="btn-row">
        <button onclick="generateAndSave()" class="btn-main">⚡ JS Code Generate & Save करें</button>
    </div>

    <div id="save-status" class="status-msg"></div>

    <div id="final-output" class="output" style="display:none;">
        <h3>जनरेट किया हुआ कोड (Bookmarklets)</h3>
        <div style="margin-bottom: 20px;">
            <strong style="color:#a9dc76;">आवेदिका का कोड:</strong>
            <textarea id="app-res" readonly></textarea>
            <button class="copy-btn" onclick="copyCode('app-res')">Copy Applicant Code</button>
        </div>
        <div id="m-res-list"></div>
    </div>
</div>

<script>
    let memberCounter = 0;
    let membersList = [];
    let lastSearchResult = null;

    window.onload = function() {
        setupNameFieldSync();
        addNewMember();
    };

    function addNewMember() {
        memberCounter++;
        const memberId = Date.now() + memberCounter;
        document.getElementById('m-container').insertAdjacentHTML('beforeend', createMemberHTML({id: memberId, index: memberCounter}));
        membersList.push(memberId);
        setTimeout(() => { initializeHindiInputs(); }, 60);
    }
    
    function createMemberHTML(memberData) {
        return `
            <div class="row" data-member-id="${memberData.id}" data-member-index="${memberData.index}">
                <div class="member-header">
                    <strong style="color:#28a745; font-size:16px;">👤 सदस्य #${memberData.index}</strong>
                    <button class="remove-btn" onclick="removeMember(${memberData.id})">✖ हटाएँ</button>
                </div>
                <div class="field">
                    <label>नाम (English)</label>
                    <input type="text" class="m_n_en" oninput="this.value = this.value.toUpperCase()" value="MEMBER NAME" placeholder="Space दबाने पर Hindi भरेगी">
                </div>
                <div class="field">
                    <label>नाम (हिंदी) <span class="auto-badge">AUTO</span></label>
                    <input type="text" class="m_n_hn" value="सदस्य का नाम" placeholder="स्वचालित हिंदी" class="hindi-field">
                   
                </div>
                <div class="field"><label>DOB (DD-MM-YYYY)</label><input type="text" class="m_dob" value="02-02-2006"></div>
                <div class="field">
                    <label>लिंग</label>
                    <select class="m_gen"><option value="M" selected>Male (पुरुष)</option><option value="F">Female (महिला)</option></select>
                </div>
                <div class="field">
                    <label>सम्बन्ध</label>
                    <select class="m_rel">
                        <option value="02" selected>1. बहन</option><option value="03">2. भाई</option>
                        <option value="04">3. माँ</option><option value="05">4. बापू</option>
                        <option value="07">5. पति</option><option value="08">6. बेटा</option>
                        <option value="09">7. बेटी</option><option value="33">8. पोती</option>
                        <option value="34">9. पोता</option><option value="48">10. बहु</option>
                        <option value="06">11. पत्नी </option>
                    </select>
                </div>
                <div class="field">
                    <label>वैवाहिक स्थिति</label>
                    <select class="m_sta">
                        <option value="1" selected>1. अविवाहित</option>
                        <option value="2">2. विवाहित</option>
                        <option value="3">3. विधवा</option>
                    </select>
                </div>
                <div class="field">
                    <label>पिता का नाम (English)</label>
                    <input type="text" class="m_f_en" oninput="this.value = this.value.toUpperCase()" value="FATHER NAME" placeholder="Space दबाने पर Hindi भरेगी">
                </div>
                <div class="field">
                    <label>पिता का नाम (हिंदी) <span class="auto-badge">AUTO</span></label>
                    <input type="text" class="m_f_hn" value="पिता का नाम" placeholder="स्वचालित हिंदी" class="hindi-field">
                    
                </div>
                <div class="field"><label>आधार नंबर</label><input type="text" class="m_aadhaar"></div>
            </div>`;
    }
    
    function removeMember(memberId) {
        const el = document.querySelector(`.row[data-member-id="${memberId}"]`);
        if(el) { el.remove(); membersList = membersList.filter(id => id !== memberId); reindexMembers(); }
    }
    function removeAllMembers() {
        document.getElementById('m-container').innerHTML = '';
        membersList = []; memberCounter = 0; addNewMember();
    }
    function reindexMembers() {
        let i = 1;
        document.querySelectorAll('#m-container .row').forEach(c => {
            const newId = Date.now() + i;
            c.setAttribute('data-member-id', newId);
            c.setAttribute('data-member-index', i);
            const h = c.querySelector('.member-header strong');
            const rb = c.querySelector('.remove-btn');
            if(h) h.innerHTML = `👤 सदस्य #${i}`;
            if(rb) rb.setAttribute('onclick', `removeMember(${newId})`);
            i++;
        });
        memberCounter = i - 1;
    }

    function generateMemberJS(member, mobile, index) {
        let age = "20";
        if(member.dob && member.dob.split("-").length === 3) {
            const by = parseInt(member.dob.split("-")[2]);
            if(!isNaN(by)) age = (new Date().getFullYear() - by).toString();
        }
        const d = {
            "ContentPlaceHolder1_txtMemberNameEn": member.name_en,
            "ContentPlaceHolder1_txtMemberNameHn": member.name_hn,
            "ContentPlaceHolder1_txtMemberFatherNameEn": member.father_en,
            "ContentPlaceHolder1_txtMemberFatherNameHn": member.father_hn,
            "ContentPlaceHolder1_ddlMemberGender": member.gender,
            "ContentPlaceHolder1_txtMemberDOB": member.dob,
            "ContentPlaceHolder1_ddlMemberMaritalStatus": member.marital_status,
            "ContentPlaceHolder1_ddlMemberRelationShip": member.relation,
            "ContentPlaceHolder1_txtMemberAadhaarNo": member.aadhaar,
            "ContentPlaceHolder1_txtMemberMobileNo": mobile,
            "ContentPlaceHolder1_ddlMemberOccupation": "13",
            "ContentPlaceHolder1_txtMemberSourceOfIncome": "NA",
            "ContentPlaceHolder1_txtMemberMonthlyIncome": "0",
            "ContentPlaceHolder1_txtMemberAge": age
        };
        return `javascript:(function(){const d=${JSON.stringify(d)};for(let id in d){let el=document.getElementById(id);if(el){el.value=d[id];el.dispatchEvent(new Event('input',{bubbles:true}));el.dispatchEvent(new Event('change',{bubbles:true}));el.dispatchEvent(new Event('blur',{bubbles:true}));}}})();`;
    }

    function generateApplicantJS(applicant, rc_no) {
        const d = {
            "ContentPlaceHolder1_txtRationCardNo": rc_no,
            "ContentPlaceHolder1_txtApplicantNameEn": applicant.name_en,
            "ContentPlaceHolder1_txtApplicantNameHn": applicant.name_hn,
            "ContentPlaceHolder1_txtApplicantFatherNameEn": applicant.father_en,
            "ContentPlaceHolder1_txtApplicantFatherNameHn": applicant.father_hn,
            "ContentPlaceHolder1_ddlApplicantGender": applicant.gender,
            "ContentPlaceHolder1_ddlApplicantRelationShip": "01",
            "ContentPlaceHolder1_ddlApplicantCasteCategory": "02",
            "ContentPlaceHolder1_txtCasteCertificateNo": applicant.cas_cert_no,
            "ContentPlaceHolder1_txtApplicantSourceOfIncome": applicant.occupation,
            "ContentPlaceHolder1_txtApplicantMonthlyIncome": applicant.income,
            "ContentPlaceHolder1_txtIncomeCertificateNo": applicant.income_cert_no,
            "ContentPlaceHolder1_ddlRectification": "I",
            "ContentPlaceHolder1_ddlBankName": "00268",
            "ContentPlaceHolder1_ddlBankBranch": "7434",
            "ContentPlaceHolder1_ddlBankIFSC": "PUNB0MBGB06",
            "ContentPlaceHolder1_txtApplicantBankAccountNo": applicant.bank_acc,
            "ContentPlaceHolder1_txtApplicantAddress": applicant.address
        };
        return `javascript:(function(){const d=${JSON.stringify(d)};function fill(){for(let id in d){let el=document.getElementById(id);if(el && el.value!==d[id]){el.value=d[id];el.dispatchEvent(new Event('change',{bubbles:true}));el.dispatchEvent(new Event('input',{bubbles:true}));}}}fill();setTimeout(fill,2000);setTimeout(fill,4000);})();`;
    }

    function collectFormData() {
        const applicant = {
            name_en: document.getElementById('a_n_en').value,
            name_hn: document.getElementById('a_n_hn').value,
            father_en: document.getElementById('a_f_en').value,
            father_hn: document.getElementById('a_f_hn').value,
            gender: document.getElementById('a_gen').value,
            occupation: document.getElementById('a_occ').value,
            income: document.getElementById('a_inc').value,
            income_cert_no: document.getElementById('a_inc_no').value,
            cas_cert_no: document.getElementById('a_cas_no').value,
            bank_acc: document.getElementById('a_bank').value,
            address: document.getElementById('a_addr').value
        };
        const members = [];
        document.querySelectorAll('#m-container .row').forEach(block => {
            members.push({
                name_en: block.querySelector('.m_n_en').value,
                name_hn: block.querySelector('.m_n_hn').value,
                father_en: block.querySelector('.m_f_en').value,
                father_hn: block.querySelector('.m_f_hn').value,
                gender: block.querySelector('.m_gen').value,
                relation: block.querySelector('.m_rel').value,
                marital_status: block.querySelector('.m_sta').value,
                dob: block.querySelector('.m_dob').value,
                aadhaar: block.querySelector('.m_aadhaar').value
            });
        });
        return { user_id: document.getElementById('user_id').value, rc_no: document.getElementById('rc_no').value, mobile: document.getElementById('m_mobile').value, applicant, members };
    }

    async function generateAndSave() {
        const { applicant, members, user_id, rc_no, mobile } = collectFormData();
        if (!user_id) { showStatus('save-status', '❌ Please enter User ID', 'error'); return; }
        const applicantJS = generateApplicantJS(applicant, rc_no);
        const memberJSList = members.map((m, i) => ({ js_code: generateMemberJS(m, mobile, i), name_en: m.name_en, index: i + 1, data: m }));
        document.getElementById('final-output').style.display = 'block';
        document.getElementById('app-res').value = applicantJS;
        const mList = document.getElementById('m-res-list');
        mList.innerHTML = '';
        memberJSList.forEach((m, idx) => {
            mList.innerHTML += `<div style="margin-top:15px;"><strong style="color:#a9dc76;">सदस्य #${m.index} (${m.name_en}) का कोड:</strong><textarea id="m-res-${idx}" readonly>${escapeHtml(m.js_code)}</textarea><button class="copy-btn" onclick="copyCode('m-res-${idx}')">Copy Member #${m.index} Code</button></div>`;
        });
        showStatus('save-status', '⏳ Database में save हो रहा है...', 'info');
        try {
            const res = await fetch('/rconline/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id, rc_no, mobile, applicant, members, applicant_js: applicantJS, members_js: memberJSList }) });
            const result = await res.json();
            showStatus('save-status', result.message, result.success ? 'success' : 'error');
        } catch(err) { showStatus('save-status', '❌ Network error: ' + err.message, 'error'); }
    }
    
    async function searchData() {
        const uid = document.getElementById('search_user_id').value.trim();
        const rcn = document.getElementById('search_rc_no').value.trim();
        if(!uid && !rcn) { showStatus('search-status', '❌ user_id या RC No में से कोई एक जरूर डालें', 'error'); return; }
        showStatus('search-status', '⏳ खोज रहे हैं...', 'info');
        document.getElementById('search-result-output').style.display = 'none';
        const params = new URLSearchParams();
        if(uid) params.append('user_id', uid);
        if(rcn) params.append('rc_no', rcn);
        try {
            const res = await fetch('/rconline/search?' + params.toString());
            const result = await res.json();
            if(result.success) {
                lastSearchResult = result;
                showStatus('search-status', `✅ मिला! Total ${result.total_members} सदस्य`, 'success');
                const div = document.getElementById('search-codes');
                div.innerHTML = `<div style="background:#e9ecef;padding:12px;border-radius:8px;margin-bottom:10px;"><strong>User ID:</strong> ${escapeHtml(result.applicant_name)}<br><strong>Total Members:</strong> ${result.total_members}</div>`;
                div.innerHTML += `<div style="margin-bottom:14px;"><strong>📋 आवेदिका का JS Code:</strong><textarea id="s-app-res" readonly style="height:70px;">${escapeHtml(result.applicant_js)}</textarea><button class="copy-btn" onclick="copyCode('s-app-res')">Copy Applicant Code</button></div>`;
                (result.members || []).forEach((m, idx) => {
                    div.innerHTML += `<div style="margin-bottom:14px;"><strong>👤 सदस्य #${m.index} (${escapeHtml(m.name_en)}) का JS Code:</strong><textarea id="s-m-res-${idx}" readonly style="height:70px;">${escapeHtml(m.js_code)}</textarea><button class="copy-btn" onclick="copyCode('s-m-res-${idx}')">Copy Member #${m.index} Code</button></div>`;
                });
                document.getElementById('search-result-output').style.display = 'block';
            } else {
                showStatus('search-status', result.message, 'error');
                document.getElementById('search-result-output').style.display = 'none';
            }
        } catch(err) { showStatus('search-status', '❌ Network error: ' + err.message, 'error'); }
    }
    
    async function loadSearchToForm() {
        if (!lastSearchResult) { showStatus('search-status', '❌ पहले खोज करें', 'error'); return; }
        showStatus('search-status', '⏳ फॉर्म में लोड हो रहा है...', 'info');
        try {
            const res = await fetch('/rconline/load?user_id=' + lastSearchResult.applicant_name);
            const result = await res.json();
            if(result.success) {
                document.getElementById('user_id').value = result.user_id;
                document.getElementById('rc_no').value = result.rc_no;
                document.getElementById('m_mobile').value = result.mobile;
                const a = result.applicant_data || {};
                ['a_n_en','a_n_hn','a_f_en','a_f_hn'].forEach((id, i) => {
                    const keys = ['name_en','name_hn','father_en','father_hn'];
                    document.getElementById(id).value = a[keys[i]] || '';
                });
                document.getElementById('a_gen').value = a.gender || 'F';
                document.getElementById('a_occ').value = a.occupation || '';
                document.getElementById('a_inc').value = a.income || '';
                document.getElementById('a_inc_no').value = a.income_cert_no || '';
                document.getElementById('a_cas_no').value = a.cas_cert_no || '';
                document.getElementById('a_bank').value = a.bank_acc || '';
                document.getElementById('a_addr').value = a.address || '';
                removeAllMembers();
                (result.members || []).forEach((member, idx) => {
                    if (idx > 0) addNewMember();
                    const block = document.querySelectorAll('#m-container .row')[idx];
                    if (block) {
                        block.querySelector('.m_n_en').value = member.name_en || '';
                        block.querySelector('.m_n_hn').value = member.name_hn || '';
                        block.querySelector('.m_f_en').value = member.father_en || '';
                        block.querySelector('.m_f_hn').value = member.father_hn || '';
                        block.querySelector('.m_gen').value = member.gender || 'M';
                        block.querySelector('.m_rel').value = member.relation || '02';
                        block.querySelector('.m_sta').value = member.marital_status || '1';
                        block.querySelector('.m_dob').value = member.dob || '';
                        block.querySelector('.m_aadhaar').value = member.aadhaar || '';
                    }
                });
                showStatus('search-status', '✅ डेटा फॉर्म में लोड हो गया!', 'success');
                setTimeout(() => { document.getElementById('search-status').style.display = 'none'; }, 2000);
            } else { showStatus('search-status', result.message, 'error'); }
        } catch(err) { showStatus('search-status', '❌ Load error: ' + err.message, 'error'); }
    }
    
    function clearSearch() {
        document.getElementById('search_user_id').value = '';
        document.getElementById('search_rc_no').value = '';
        document.getElementById('search-status').style.display = 'none';
        document.getElementById('search-result-output').style.display = 'none';
        lastSearchResult = null;
    }
    function showStatus(id, msg, type) {
        const el = document.getElementById(id);
        el.style.display = 'block'; el.className = `status-msg status-${type}`; el.textContent = msg;
        setTimeout(() => { el.style.display = 'none'; }, 5000);
    }
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function copyCode(id) {
        const t = document.getElementById(id); t.select();
        navigator.clipboard.writeText(t.value);
        alert("✅ कोड कॉपी हो गया!");
    }
</script>

</body>
</html>
