<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Tool Hub | Free Online Tools</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; }
        header { background: #1a1a1a; color: white; padding: 15px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .hero { text-align: center; padding: 50px 20px; background: #fff; border-bottom: 1px solid #ddd; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px; max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 25px; text-decoration: none; color: #333; text-align: center; transition: 0.3s; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: #007bff; }
        .card img { width: 70px; height: 70px; margin-bottom: 15px; }
        .card h3 { margin: 10px 0; color: #007bff; }
        .card p { font-size: 14px; color: #666; min-height: 40px; }
        .btn-tag { display: inline-block; margin-top: 15px; padding: 8px 20px; background: #007bff; color: white; border-radius: 5px; font-weight: bold; }
        footer { text-align: center; padding: 20px; background: #1a1a1a; color: white; }
    </style>
</head>
<body>

<header>
    <img src="{{ url_for('static', filename='logo.png') }}" width="40">
    <h1>Python Tool Hub</h1>
</header>

<section class="hero">
    <h1>Free Online Tools</h1>
    <p>Fast • Secure • Private</p>
</section>

<div class="container">
    {% for tool in tools %}
    <a href="{{ tool.url }}" class="card">
        <img src="{{ url_for('static', filename=tool.img) }}" alt="icon">
        <h3>{{ tool.title }}</h3>
        <p>{{ tool.desc }}</p>
        <span class="btn-tag">Open Tool</span>
    </a>
    {% endfor %}
</div>

<footer>
    <p>© 2026 Python Tool Hub | Bihar Tech</p>
</footer>

</body>
</html>
