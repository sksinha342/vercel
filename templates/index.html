    <script>
        function toggleMenu() {
            var menu = document.getElementById("navContainer");
            menu.style.display = (menu.style.display === "block") ? "none" : "block";
        }

        function filterTools() {
            let input = document.getElementById('toolSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
                cards[i].style.display = title.includes(input) ? "block" : "none";
            }
        }

        function generateBreadcrumb() {
            let breadcrumbHTML = '<a href="/">Home</a> > Tools Hub';
            document.getElementById("breadcrumb").innerHTML = breadcrumbHTML;
        }
        generateBreadcrumb();
