<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href='./static/img/sksinha4.ico' rel='icon' type='image/x-icon'/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pro Scanner - Perspective Correction Tool</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            margin: 0;
            padding: 12px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1a1a1a;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h2 {
            margin: 0 0 16px 0;
            font-size: 1.5rem;
            text-align: center;
            background: linear-gradient(135deg, #1e90ff, #00c6fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Simple File Input */
        #upload {
            width: 100%;
            padding: 12px;
            background: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 16px;
        }

        #upload::-webkit-file-upload-button {
            background: #1e90ff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-right: 12px;
        }

        #upload::-webkit-file-upload-button:hover {
            background: #0066cc;
        }

        /* Canvas Container */
        .canvas-wrapper {
            position: relative;
            margin: 16px 0;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            background: #111;
            border: 1px solid #333;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            cursor: grab;
            touch-action: none;
        }

        canvas:active {
            cursor: grabbing;
        }

        /* Controls Panel */
        .controls-panel {
            background: #252525;
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
        }

        .control-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .control-item {
            flex: 1;
            min-width: 100px;
        }

        .control-item label {
            display: block;
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 4px;
        }

        .control-item input, .control-item select {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }

        button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e90ff, #0066cc);
        }

        .btn-success {
            background: linear-gradient(135deg, #2ed573, #00a852);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757, #cc0033);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffa502, #cc7a00);
        }

        .btn-secondary {
            background: #3a3a3a;
        }

        /* Preview Section */
        .preview-section {
            background: #252525;
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }

        .preview-title {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 12px;
        }

        .preview-canvas-wrapper {
            display: flex;
            justify-content: center;
            background: #0a0a0a;
            border-radius: 12px;
            padding: 12px;
        }

        #previewCanvas {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            background: #000;
        }

        /* Loading Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Custom Confirmation Dialog */
        .confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.2s ease;
        }

        .confirm-dialog {
            background: #252525;
            border-radius: 20px;
            padding: 24px;
            max-width: 350px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.2s ease;
        }

        .confirm-dialog h3 {
            color: #1e90ff;
            margin-bottom: 16px;
        }

        .confirm-dialog .size-info {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 12px;
            margin: 16px 0;
        }

        .confirm-dialog .original-size {
            color: #ffa502;
            font-size: 18px;
            font-weight: bold;
        }

        .confirm-dialog .new-size {
            color: #2ed573;
            font-size: 24px;
            font-weight: bold;
        }

        .confirm-dialog .saved {
            color: #2ed573;
            font-size: 14px;
            margin-top: 8px;
        }

        .confirm-dialog .increased {
            color: #ff4757;
            font-size: 14px;
            margin-top: 8px;
        }

        .confirm-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .confirm-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-confirm {
            background: #2ed573;
            color: white;
        }

        .btn-cancel {
            background: #ff4757;
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Mobile Optimizations */
        @media (max-width: 600px) {
            body { padding: 8px; }
            .container { padding: 12px; }
            button { padding: 10px 12px; font-size: 0.8rem; }
            .control-item { min-width: 80px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">
    <h2>📄 Pro Scanner</h2>

    <!-- Simple File Input -->
    <input type="file" id="upload" accept="image/*">

    <!-- Canvas Area -->
    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="mainCanvas"></canvas>
    </div>

    <!-- Controls -->
    <div class="controls-panel">
        <div class="control-group">
            <div class="control-item">
                <label>🎯 Output Format</label>
                <select id="outputFormat">
                    <option value="jpeg">JPEG (Small Size)</option>
                    <option value="png">PNG (Lossless)</option>
                    <option value="webp">WebP (Best Compression)</option>
                </select>
            </div>
            <div class="control-item">
                <label>📦 Target Size (KB)</label>
                <input type="number" id="targetKB" placeholder="Auto" step="50" min="10">
            </div>
            <div class="control-item">
                <label>🔄 Quality (1-100)</label>
                <input type="number" id="quality" value="90" min="1" max="100" step="5">
            </div>
        </div>

        <!-- Rotation Controls -->
        <div class="control-group">
            <div class="control-item">
                <label>🔄 Rotate Image</label>
                <div style="display: flex; gap: 8px;">
                    <button id="rotateLeft90" class="btn-secondary" style="flex: 1;">↺ 90°</button>
                    <button id="rotateRight90" class="btn-secondary" style="flex: 1;">↻ 90°</button>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button id="resetBtn" class="btn-warning">⟳ Reset Points</button>
            <button id="downloadImgBtn" class="btn-success">💾 Save as Image</button>
            <button id="downloadPdfBtn" class="btn-danger">📑 Save as PDF</button>
        </div>
    </div>

    <!-- Preview Section -->
    <div class="preview-section">
        <div class="preview-title">✨ Live Preview (Corrected)</div>
        <div class="preview-canvas-wrapper">
            <canvas id="previewCanvas" width="300" height="300" style="width:100%; height:auto; max-width:300px"></canvas>
        </div>
    </div>
</div>

<script>
    // ========== DOM Elements ==========
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const previewCanvas = document.getElementById('previewCanvas');
    const previewCtx = previewCanvas.getContext('2d');
    const fileInput = document.getElementById('upload');
    
    // ========== State Variables ==========
    let currentImage = null;
    let originalWidth = 0, originalHeight = 0;
    let canvasWidth = 0, canvasHeight = 0;
    let isImageLoaded = false;
    let currentRotation = 0;
    let originalImageData = null;
    let originalFileSizeKB = 0;
    
    // 4 Corner Points (Normalized: 0-1 relative to original image)
    let points = [
        { x: 0.1, y: 0.1 },
        { x: 0.9, y: 0.1 },
        { x: 0.9, y: 0.9 },
        { x: 0.1, y: 0.9 }
    ];
    
    let draggingPoint = -1;
    let previewTimeout = null;
    
    // ========== Helper Functions ==========
    function updateCanvasSize() {
        if (!currentImage) return;
        const wrapper = document.getElementById('canvasWrapper');
        const maxWidth = Math.min(wrapper.clientWidth - 20, window.innerWidth - 40);
        const maxHeight = window.innerHeight - 350;
        
        let scale = Math.min(maxWidth / originalWidth, maxHeight / originalHeight, 1.5);
        scale = Math.max(scale, 0.3);
        
        canvasWidth = originalWidth * scale;
        canvasHeight = originalHeight * scale;
        
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
    }
    
    function drawCanvas() {
        if (!currentImage || !isImageLoaded) return;
        
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        ctx.drawImage(currentImage, 0, 0, canvasWidth, canvasHeight);
        
        // Draw perspective lines
        ctx.beginPath();
        ctx.strokeStyle = '#1e90ff';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 0;
        
        for (let i = 0; i < 4; i++) {
            const p1 = points[i];
            const p2 = points[(i + 1) % 4];
            const x1 = p1.x * canvasWidth;
            const y1 = p1.y * canvasHeight;
            const x2 = p2.x * canvasWidth;
            const y2 = p2.y * canvasHeight;
            
            if (i === 0) ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
        }
        ctx.closePath();
        ctx.stroke();
        
        // Draw control points
        points.forEach((point, idx) => {
            const x = point.x * canvasWidth;
            const y = point.y * canvasHeight;
            
            ctx.fillStyle = draggingPoint === idx ? '#ff4757' : '#ffffff';
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = '#1e90ff';
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, 2 * Math.PI);
            ctx.fill();
        });
        ctx.shadowBlur = 0;
    }
    
    // ========== Rotation Functions ==========
    function rotateImage(degrees) {
        if (!currentImage || !isImageLoaded) return;
        
        currentRotation = (currentRotation + degrees) % 360;
        if (currentRotation < 0) currentRotation += 360;
        
        const rotatedCanvas = document.createElement('canvas');
        const angleRad = (currentRotation * Math.PI) / 180;
        const sin = Math.abs(Math.sin(angleRad));
        const cos = Math.abs(Math.cos(angleRad));
        
        const newWidth = Math.floor(originalWidth * cos + originalHeight * sin);
        const newHeight = Math.floor(originalWidth * sin + originalHeight * cos);
        
        rotatedCanvas.width = newWidth;
        rotatedCanvas.height = newHeight;
        
        const rotatedCtx = rotatedCanvas.getContext('2d');
        rotatedCtx.translate(newWidth / 2, newHeight / 2);
        rotatedCtx.rotate(angleRad);
        rotatedCtx.drawImage(currentImage, -originalWidth / 2, -originalHeight / 2);
        
        const rotatedImg = new Image();
        rotatedImg.onload = () => {
            currentImage = rotatedImg;
            originalWidth = rotatedImg.width;
            originalHeight = rotatedImg.height;
            
            points = [
                { x: 0.1, y: 0.1 },
                { x: 0.9, y: 0.1 },
                { x: 0.9, y: 0.9 },
                { x: 0.1, y: 0.9 }
            ];
            
            updateCanvasSize();
            drawCanvas();
            updatePreview();
        };
        rotatedImg.src = rotatedCanvas.toDataURL();
    }
    
    // ========== Perspective Transform Functions ==========
    function getPerspectiveTransform(src, dst) {
        const A = [];
        const B = [];
        
        for (let i = 0; i < 4; i++) {
            A.push([src[i].x, src[i].y, 1, 0, 0, 0, -dst[i].x * src[i].x, -dst[i].x * src[i].y]);
            A.push([0, 0, 0, src[i].x, src[i].y, 1, -dst[i].y * src[i].x, -dst[i].y * src[i].y]);
            B.push(dst[i].x);
            B.push(dst[i].y);
        }
        
        function gaussianElimination(matrix, rhs) {
            const n = matrix.length;
            const augmented = matrix.map((row, i) => [...row, rhs[i]]);
            
            for (let i = 0; i < n; i++) {
                let maxRow = i;
                for (let j = i + 1; j < n; j++) {
                    if (Math.abs(augmented[j][i]) > Math.abs(augmented[maxRow][i])) maxRow = j;
                }
                [augmented[i], augmented[maxRow]] = [augmented[maxRow], augmented[i]];
                
                const pivot = augmented[i][i];
                if (Math.abs(pivot) < 1e-8) continue;
                
                for (let k = i; k <= n; k++) {
                    augmented[i][k] /= pivot;
                }
                
                for (let j = 0; j < n; j++) {
                    if (j !== i && Math.abs(augmented[j][i]) > 1e-8) {
                        const factor = augmented[j][i];
                        for (let k = i; k <= n; k++) {
                            augmented[j][k] -= factor * augmented[i][k];
                        }
                    }
                }
            }
            return augmented.map(row => row[n]);
        }
        
        const H = gaussianElimination(A, B);
        H.push(1);
        return H;
    }
    
    function applyMatrix(H, x, y) {
        const denominator = H[6] * x + H[7] * y + 1;
        const u = (H[0] * x + H[1] * y + H[2]) / denominator;
        const v = (H[3] * x + H[4] * y + H[5]) / denominator;
        return { x: u, y: v };
    }
    
    function bilinearInterpolate(imageData, x, y) {
        const w = imageData.width;
        const h = imageData.height;
        const x0 = Math.floor(x);
        const y0 = Math.floor(y);
        const x1 = Math.min(x0 + 1, w - 1);
        const y1 = Math.min(y0 + 1, h - 1);
        
        const fx = x - x0;
        const fy = y - y0;
        
        function getPixel(px, py) {
            const idx = (py * w + px) * 4;
            return {
                r: imageData.data[idx],
                g: imageData.data[idx + 1],
                b: imageData.data[idx + 2],
                a: imageData.data[idx + 3]
            };
        }
        
        const p00 = getPixel(x0, y0);
        const p10 = getPixel(x1, y0);
        const p01 = getPixel(x0, y1);
        const p11 = getPixel(x1, y1);
        
        const r = Math.round(p00.r * (1 - fx) * (1 - fy) + p10.r * fx * (1 - fy) + p01.r * (1 - fx) * fy + p11.r * fx * fy);
        const g = Math.round(p00.g * (1 - fx) * (1 - fy) + p10.g * fx * (1 - fy) + p01.g * (1 - fx) * fy + p11.g * fx * fy);
        const b = Math.round(p00.b * (1 - fx) * (1 - fy) + p10.b * fx * (1 - fy) + p01.b * (1 - fx) * fy + p11.b * fx * fy);
        
        return { r, g, b };
    }
    
    function perspectiveTransform(points, outWidth, outHeight) {
        const srcCorners = [
            { x: 0, y: 0 },
            { x: outWidth, y: 0 },
            { x: outWidth, y: outHeight },
            { x: 0, y: outHeight }
        ];
        
        const dstCorners = points.map(p => ({
            x: p.x * originalWidth,
            y: p.y * originalHeight
        }));
        
        const H = getPerspectiveTransform(srcCorners, dstCorners);
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = originalWidth;
        tempCanvas.height = originalHeight;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(currentImage, 0, 0);
        const imgData = tempCtx.getImageData(0, 0, originalWidth, originalHeight);
        
        const outCanvas = document.createElement('canvas');
        outCanvas.width = outWidth;
        outCanvas.height = outHeight;
        const outCtx = outCanvas.getContext('2d');
        const outData = outCtx.createImageData(outWidth, outHeight);
        
        for (let y = 0; y < outHeight; y++) {
            for (let x = 0; x < outWidth; x++) {
                const srcPos = applyMatrix(H, x, y);
                if (srcPos.x >= 0 && srcPos.x < originalWidth - 1 && srcPos.y >= 0 && srcPos.y < originalHeight - 1) {
                    const color = bilinearInterpolate(imgData, srcPos.x, srcPos.y);
                    const idx = (y * outWidth + x) * 4;
                    outData.data[idx] = color.r;
                    outData.data[idx + 1] = color.g;
                    outData.data[idx + 2] = color.b;
                    outData.data[idx + 3] = 255;
                } else {
                    const idx = (y * outWidth + x) * 4;
                    outData.data[idx] = 255;
                    outData.data[idx + 1] = 255;
                    outData.data[idx + 2] = 255;
                    outData.data[idx + 3] = 255;
                }
            }
        }
        
        outCtx.putImageData(outData, 0, 0);
        return outCanvas;
    }
    
    function updatePreview() {
        if (!currentImage || !isImageLoaded) return;
        
        if (previewTimeout) clearTimeout(previewTimeout);
        previewTimeout = setTimeout(() => {
            try {
                const dstCorners = points.map(p => ({ x: p.x * originalWidth, y: p.y * originalHeight }));
                const width = Math.sqrt(Math.pow(dstCorners[1].x - dstCorners[0].x, 2) + Math.pow(dstCorners[1].y - dstCorners[0].y, 2));
                const height = Math.sqrt(Math.pow(dstCorners[3].x - dstCorners[0].x, 2) + Math.pow(dstCorners[3].y - dstCorners[0].y, 2));
                
                const previewSize = 250;
                let outW, outH;
                if (width > height) {
                    outW = previewSize;
                    outH = Math.round(previewSize * height / width);
                } else {
                    outH = previewSize;
                    outW = Math.round(previewSize * width / height);
                }
                
                const corrected = perspectiveTransform(points, outW, outH);
                previewCanvas.width = previewSize;
                previewCanvas.height = previewSize;
                previewCtx.fillStyle = '#1a1a1a';
                previewCtx.fillRect(0, 0, previewSize, previewSize);
                const offsetX = (previewSize - outW) / 2;
                const offsetY = (previewSize - outH) / 2;
                previewCtx.drawImage(corrected, offsetX, offsetY, outW, outH);
            } catch(e) {
                console.error('Preview error:', e);
            }
        }, 150);
    }
    
    // ========== Image Loading ==========
    function loadImage(file) {
        if (!file || !file.type.startsWith('image/')) {
            alert('Please select a valid image file');
            return;
        }
        
        originalFileSizeKB = file.size / 1024;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                currentImage = img;
                originalWidth = img.width;
                originalHeight = img.height;
                isImageLoaded = true;
                currentRotation = 0;
                originalImageData = e.target.result;
                
                updateCanvasSize();
                resetPoints();
                drawCanvas();
                updatePreview();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
    
    function resetPoints() {
        points = [
            { x: 0.1, y: 0.1 },
            { x: 0.9, y: 0.1 },
            { x: 0.9, y: 0.9 },
            { x: 0.1, y: 0.9 }
        ];
        drawCanvas();
        updatePreview();
    }
    
    // ========== Download with Confirmation ==========
    function showConfirmDialog(originalSize, newSize, downloadCallback) {
        // Remove any existing overlay
        const existingOverlay = document.querySelector('.confirm-overlay');
        if (existingOverlay) existingOverlay.remove();
        
        const overlay = document.createElement('div');
        overlay.className = 'confirm-overlay';
        
        const saved = originalSize - newSize;
        const isCompressed = saved > 0;
        const savedPercent = ((saved / originalSize) * 100).toFixed(1);
        
        overlay.innerHTML = `
            <div class="confirm-dialog">
                <h3>📊 Download Confirmation</h3>
                <div class="size-info">
                    <div style="margin-bottom: 8px;">📁 Original Size:</div>
                    <div class="original-size">${originalSize.toFixed(1)} KB</div>
                    <div style="margin: 12px 0 8px 0;">✨ New Size:</div>
                    <div class="new-size">${newSize.toFixed(1)} KB</div>
                    ${isCompressed ? 
                        `<div class="saved">✅ Saved: ${saved.toFixed(1)} KB (${savedPercent}% smaller)</div>` : 
                        `<div class="increased">⚠️ Increased: ${Math.abs(saved).toFixed(1)} KB (${Math.abs(savedPercent)}% larger)</div>`
                    }
                </div>
                <div class="confirm-buttons">
                    <button class="btn-confirm" id="confirmDownload">✓ Download</button>
                    <button class="btn-cancel" id="cancelDownload">✗ Cancel</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(overlay);
        
        document.getElementById('confirmDownload').onclick = () => {
            overlay.remove();
            downloadCallback();
        };
        
        document.getElementById('cancelDownload').onclick = () => {
            overlay.remove();
        };
        
        // Close on overlay click
        overlay.onclick = (e) => {
            if (e.target === overlay) {
                overlay.remove();
            }
        };
    }
    
    async function getCorrectedBlob(format, quality, targetKB) {
        return new Promise(async (resolve) => {
            const dstCorners = points.map(p => ({ x: p.x * originalWidth, y: p.y * originalHeight }));
            const width = Math.round(Math.sqrt(Math.pow(dstCorners[1].x - dstCorners[0].x, 2) + Math.pow(dstCorners[1].y - dstCorners[0].y, 2)));
            const height = Math.round(Math.sqrt(Math.pow(dstCorners[3].x - dstCorners[0].x, 2) + Math.pow(dstCorners[3].y - dstCorners[0].y, 2)));
            
            const correctedCanvas = perspectiveTransform(points, Math.max(width, 1), Math.max(height, 1));
            
            let mimeType = 'image/jpeg';
            if (format === 'png') { mimeType = 'image/png'; }
            if (format === 'webp') { mimeType = 'image/webp'; }
            
            let finalQuality = quality / 100;
            
            if (targetKB && targetKB > 10) {
                let low = 0.1, high = 1.0;
                let bestBlob = null;
                
                for (let i = 0; i < 8; i++) {
                    const testQuality = (low + high) / 2;
                    const blob = await new Promise(res => correctedCanvas.toBlob(res, mimeType, testQuality));
                    if (blob.size / 1024 > targetKB) {
                        high = testQuality;
                    } else {
                        low = testQuality;
                        bestBlob = blob;
                    }
                }
                resolve(bestBlob || await new Promise(res => correctedCanvas.toBlob(res, mimeType, finalQuality)));
            } else {
                correctedCanvas.toBlob(resolve, mimeType, finalQuality);
            }
        });
    }
    
    async function downloadAsImage() {
        if (!currentImage) { alert('Please load an image first'); return; }
        
        const btn = document.getElementById('downloadImgBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="spinner"></span> Processing...';
        btn.disabled = true;
        
        try {
            const format = document.getElementById('outputFormat').value;
            const quality = parseInt(document.getElementById('quality').value) || 90;
            const targetKB = parseInt(document.getElementById('targetKB').value) || null;
            
            const blob = await getCorrectedBlob(format, quality, targetKB);
            const newSizeKB = blob.size / 1024;
            
            // Show confirmation dialog
            showConfirmDialog(originalFileSizeKB, newSizeKB, () => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `scanned_document.${format === 'jpeg' ? 'jpg' : format}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
            
        } catch(e) {
            alert('Error: ' + e.message);
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
    
    async function downloadAsPDF() {
        if (!currentImage) { alert('Please load an image first'); return; }
        
        const btn = document.getElementById('downloadPdfBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="spinner"></span> Generating PDF...';
        btn.disabled = true;
        
        try {
            const quality = parseInt(document.getElementById('quality').value) || 90;
            const targetKB = parseInt(document.getElementById('targetKB').value) || null;
            
            const blob = await getCorrectedBlob('jpeg', quality, targetKB);
            const newSizeKB = blob.size / 1024;
            
            // Show confirmation dialog
            showConfirmDialog(originalFileSizeKB, newSizeKB, () => {
                const imgUrl = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = () => {
                    const { jsPDF } = window.jspdf;
                    let pdf;
                    if (img.width > img.height) {
                        pdf = new jsPDF('landscape', 'mm', [img.width * 0.264583, img.height * 0.264583]);
                    } else {
                        pdf = new jsPDF('portrait', 'mm', [img.width * 0.264583, img.height * 0.264583]);
                    }
                    
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (img.height * pdfWidth) / img.width;
                    
                    pdf.addImage(imgUrl, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save('scanned_document.pdf');
                    URL.revokeObjectURL(imgUrl);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                };
                img.src = imgUrl;
            });
            
            btn.innerHTML = originalText;
            btn.disabled = false;
            
        } catch(e) {
            alert('PDF Error: ' + e.message);
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
    
    // ========== Mouse/Touch Interactions ==========
    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        let x = (clientX - rect.left) * scaleX;
        let y = (clientY - rect.top) * scaleY;
        x = Math.max(0, Math.min(canvas.width, x));
        y = Math.max(0, Math.min(canvas.height, y));
        return { x, y };
    }
    
    function handleStart(e) {
        e.preventDefault();
        if (!currentImage) return;
        
        const { x, y } = getCanvasCoords(e);
        let minDist = 30;
        draggingPoint = -1;
        
        points.forEach((point, idx) => {
            const px = point.x * canvasWidth;
            const py = point.y * canvasHeight;
            const dist = Math.hypot(x - px, y - py);
            if (dist < minDist) {
                minDist = dist;
                draggingPoint = idx;
            }
        });
    }
    
    function handleMove(e) {
        if (draggingPoint === -1 || !currentImage) return;
        e.preventDefault();
        
        const { x, y } = getCanvasCoords(e);
        points[draggingPoint] = {
            x: x / canvasWidth,
            y: y / canvasHeight
        };
        drawCanvas();
        updatePreview();
    }
    
    function handleEnd() {
        draggingPoint = -1;
    }
    
    // ========== Event Listeners ==========
    canvas.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    
    canvas.addEventListener('touchstart', handleStart, { passive: false });
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('touchend', handleEnd);
    
    document.getElementById('resetBtn').addEventListener('click', resetPoints);
    document.getElementById('downloadImgBtn').addEventListener('click', downloadAsImage);
    document.getElementById('downloadPdfBtn').addEventListener('click', downloadAsPDF);
    
    document.getElementById('rotateLeft90').addEventListener('click', () => {
        if (currentImage) rotateImage(-90);
    });
    
    document.getElementById('rotateRight90').addEventListener('click', () => {
        if (currentImage) rotateImage(90);
    });
    
    // Simple File Input Handler
    fileInput.addEventListener('change', function(e) {
        if (e.target.files && e.target.files[0]) {
            loadImage(e.target.files[0]);
        }
        fileInput.value = '';
    });
    
    window.addEventListener('resize', () => {
        if (currentImage) {
            updateCanvasSize();
            drawCanvas();
            updatePreview();
        }
    });
    
    document.getElementById('quality').addEventListener('change', () => updatePreview());
    document.getElementById('outputFormat').addEventListener('change', () => updatePreview());
</script>
