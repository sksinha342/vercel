name: Keep Render Alive Smart Schedule

on:
  schedule:
    # Schedule 1: Har ghante ki 0th, 14th, 28th, aur 42nd minute par chalega
    # Hours (4-15): UTC ke subah 4 baje se dopehar 3 baje tak (IST: 9:30 AM से 9:29 PM)
    - cron: '0,14,28,42 4-15 * * *'

    # Schedule 2: Raat ko exact 9:30 PM se 10:00 PM ke beech ka gap maintain karne ke liye
    # Yeh UTC ke 16:00 baje (IST: 9:30 PM) par chalta hai
    - cron: '0,14 * * *'

  workflow_dispatch: # Taaki aap manually bhi test kar sakein

jobs:
  ping_render:
    runs-on: ubuntu-latest
    steps:
      - name: Direct Ping to Render API
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://renver.onrender.com